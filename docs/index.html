<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Jar</title>
  <script src="docs/config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e8ff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      border-bottom: 1px solid #1a2a4a;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 1.4rem;
      font-weight: bold;
      color: #4fc3f7;
      letter-spacing: 3px;
    }
    .logo span { color: #ffffff; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .product-name { color: #5a7aa0; font-size: 0.85rem; }
    .api-key-input {
      background: #0d1a2a;
      border: 1px solid #1a2a4a;
      border-radius: 6px;
      color: #e0e8ff;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      outline: none;
      width: 220px;
    }
    .api-key-input:focus { border-color: #4fc3f7; }
    .main {
      display: flex;
      flex: 1;
      height: calc(100vh - 61px);
      overflow: hidden;
    }

    /* LEFT: Table of contents */
    .toc-panel {
      width: 260px;
      min-width: 260px;
      border-right: 1px solid #1a2a4a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .toc-header {
      padding: 1rem 1.25rem 0.5rem;
      font-size: 0.65rem;
      color: #4fc3f7;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid #1a2a4a;
    }
    .toc-item {
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      color: #5a7aa0;
      cursor: pointer;
      border-bottom: 1px solid #0d1520;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .toc-item:hover { background: #0d1a2a; color: #a0c8e8; }
    .toc-item.active { background: #0d2137; color: #4fc3f7; border-left: 3px solid #4fc3f7; }
    .toc-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1a2a4a;
      flex-shrink: 0;
    }
    .toc-item.active .toc-dot { background: #4fc3f7; }
    .ask-all-btn {
      margin: 1rem;
      padding: 0.6rem;
      background: #0d2137;
      border: 1px solid #4fc3f7;
      border-radius: 6px;
      color: #4fc3f7;
      font-size: 0.8rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .ask-all-btn:hover { background: #4fc3f7; color: #000; }

    /* CENTER: Doc viewer */
    .doc-panel {
      width: 320px;
      min-width: 320px;
      border-right: 1px solid #1a2a4a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .doc-panel-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid #1a2a4a;
      font-size: 0.85rem;
      color: #a0b8d0;
      font-weight: bold;
    }
    .doc-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      font-size: 0.82rem;
      line-height: 1.7;
      color: #7090b0;
      white-space: pre-wrap;
    }
    .doc-content.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a3a5a;
      font-style: italic;
    }

    /* RIGHT: Chat */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.25rem;
    }
    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .section-label {
      font-size: 0.65rem;
      color: #4fc3f7;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .clear-btn {
      background: transparent;
      border: 1px solid #1a2a4a;
      color: #5a7aa0;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: #4fc3f7; color: #4fc3f7; }
    .suggested {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.75rem;
    }
    .suggest-btn {
      background: #0d1a2a;
      border: 1px solid #1a2a4a;
      color: #5a7aa0;
      border-radius: 20px;
      padding: 0.25rem 0.65rem;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggest-btn:hover { border-color: #4fc3f7; color: #4fc3f7; }
    .chat-window {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .message { display: flex; flex-direction: column; gap: 0.2rem; max-width: 88%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.jarvis { align-self: flex-start; align-items: flex-start; }
    .message-label { font-size: 0.62rem; color: #5a7aa0; text-transform: uppercase; letter-spacing: 1px; }
    .message.jarvis .message-label { color: #4fc3f7; }
    .message-bubble {
      padding: 0.65rem 0.9rem;
      border-radius: 10px;
      font-size: 0.86rem;
      line-height: 1.6;
    }
    .message.user .message-bubble {
      background: #0d2a3a;
      border: 1px solid #1a4a6a;
      color: #e0e8ff;
      border-bottom-right-radius: 3px;
    }
    .message.jarvis .message-bubble {
      background: #0d1a2a;
      border: 1px solid #1a2a4a;
      color: #c0d8f0;
      border-bottom-left-radius: 3px;
    }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #2a3a5a;
      gap: 0.5rem;
      text-align: center;
    }
    .empty-state .icon { font-size: 2.5rem; }
    .empty-state p { font-size: 0.82rem; }
    .input-row { display: flex; gap: 0.6rem; }
    .question-input {
      flex: 1;
      background: #0d1a2a;
      border: 1px solid #1a2a4a;
      border-radius: 8px;
      color: #e0e8ff;
      padding: 0.7rem 1rem;
      font-size: 0.88rem;
      outline: none;
      font-family: inherit;
    }
    .question-input:focus { border-color: #4fc3f7; }
    .question-input::placeholder { color: #2a3a5a; }
    .send-btn {
      background: #4fc3f7;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1.25rem;
      font-size: 0.88rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .send-btn:hover { background: #81d4fa; }
    .send-btn:disabled { background: #1a2a4a; color: #5a7aa0; cursor: not-allowed; }
    .context-badge {
      font-size: 0.68rem;
      color: #5a7aa0;
      margin-bottom: 0.5rem;
    }
    .context-badge span { color: #4fc3f7; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">ASK <span>JAR</span></div>
  </div>
  <div class="header-right">
    <span class="product-name" id="product-name"></span>
    <input class="api-key-input" type="password" id="api-key" placeholder="Anthropic API key (sk-ant-...)" />
  </div>
</header>

<div class="main">

  <!-- TABLE OF CONTENTS -->
  <div class="toc-panel">
    <div class="toc-header">Documentation</div>
    <div id="toc-items"></div>
    <button class="ask-all-btn" onclick="setContext('all')">Ask about everything</button>
  </div>

  <!-- DOCUMENT VIEWER -->
  <div class="doc-panel">
    <div class="doc-panel-header" id="doc-title">Select a section</div>
    <div class="doc-content empty" id="doc-content">
      Select a section from the left to preview its content.
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="section-label">JARVIS</div>
      <button class="clear-btn" onclick="clearChat()">Clear</button>
    </div>

    <div class="suggested" id="suggested-questions">
      <button class="suggest-btn" onclick="askSuggested(this)">Summarize this section</button>
      <button class="suggest-btn" onclick="askSuggested(this)">What are the key points?</button>
      <button class="suggest-btn" onclick="askSuggested(this)">What should I know first?</button>
      <button class="suggest-btn" onclick="askSuggested(this)">What are the limitations?</button>
      <button class="suggest-btn" onclick="askSuggested(this)">How does pricing work?</button>
    </div>

    <div class="context-badge" id="context-badge"></div>

    <div class="chat-window" id="chat-window">
      <div class="empty-state" id="empty-state">
        <div class="icon">⬡</div>
        <p>Select a section from the left or click<br>"Ask about everything" to get started.</p>
      </div>
    </div>

    <div class="input-row">
      <input class="question-input" id="question-input" type="text"
        placeholder="Ask JARVIS anything..."
        onkeydown="if(event.key==='Enter') askQuestion()" />
      <button class="send-btn" id="send-btn" onclick="askQuestion()">Ask</button>
    </div>
  </div>

</div>

<script>
  let currentContext = 'all';
  let messages = [];

  // ---------------------------------------------------------------------------
  // Initialize from config
  // ---------------------------------------------------------------------------
  function init() {
    const config = window.JARVIS_CONFIG;
    if (!config) { console.error('config.js not loaded'); return; }

    document.title = `Ask Jar — ${config.productName}`;
    document.getElementById('product-name').textContent = config.productName;

    if (config.apiKey) {
      document.getElementById('api-key').value = config.apiKey;
    }

    // Build table of contents
    const toc = document.getElementById('toc-items');
    config.sections.forEach((section, i) => {
      const item = document.createElement('div');
      item.className = 'toc-item';
      item.id = `toc-${i}`;
      item.innerHTML = `<div class="toc-dot"></div>${section.title}`;
      item.onclick = () => setContext(i);
      toc.appendChild(item);
    });

    updateContextBadge();
  }

  // ---------------------------------------------------------------------------
  // Set active context (section index or 'all')
  // ---------------------------------------------------------------------------
  function setContext(index) {
    currentContext = index;
    messages = [];

    // Update TOC active state
    document.querySelectorAll('.toc-item').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });

    // Update doc viewer
    const config = window.JARVIS_CONFIG;
    if (index === 'all') {
      document.getElementById('doc-title').textContent = 'All Documentation';
      document.getElementById('doc-content').textContent =
        config.sections.map(s => `=== ${s.title} ===\n${s.content.trim()}`).join('\n\n');
      document.getElementById('doc-content').classList.remove('empty');
    } else {
      const section = config.sections[index];
      document.getElementById('doc-title').textContent = section.title;
      document.getElementById('doc-content').textContent = section.content.trim();
      document.getElementById('doc-content').classList.remove('empty');
    }

    updateContextBadge();
    clearChat();
  }

  function updateContextBadge() {
    const config = window.JARVIS_CONFIG;
    const badge = document.getElementById('context-badge');
    if (currentContext === 'all') {
      badge.innerHTML = `Context: <span>All ${config.sections.length} sections</span>`;
    } else {
      badge.innerHTML = `Context: <span>${config.sections[currentContext].title}</span>`;
    }
  }

  // ---------------------------------------------------------------------------
  // Build the document context for the prompt
  // ---------------------------------------------------------------------------
  function getDocumentContext() {
    const config = window.JARVIS_CONFIG;
    if (currentContext === 'all') {
      return config.sections.map(s => `=== ${s.title} ===\n${s.content.trim()}`).join('\n\n');
    }
    const section = config.sections[currentContext];
    return `=== ${section.title} ===\n${section.content.trim()}`;
  }

  // ---------------------------------------------------------------------------
  // Chat helpers
  // ---------------------------------------------------------------------------
  function addMessage(role, content) {
    const win = document.getElementById('chat-window');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="message-label">${role === 'user' ? 'You' : 'JARVIS'}</div>
      <div class="message-bubble">${content.replace(/\n/g, '<br>')}</div>
    `;
    win.appendChild(div);
    win.scrollTop = win.scrollHeight;
  }

  function clearChat() {
    messages = [];
    const win = document.getElementById('chat-window');
    win.innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="icon">⬡</div>
        <p>Select a section from the left or click<br>"Ask about everything" to get started.</p>
      </div>
    `;
  }

  function askSuggested(btn) {
    document.getElementById('question-input').value = btn.textContent;
    askQuestion();
  }

  // ---------------------------------------------------------------------------
  // Ask JARVIS
  // ---------------------------------------------------------------------------
  async function askQuestion() {
    const apiKey = document.getElementById('api-key').value.trim();
    const question = document.getElementById('question-input').value.trim();

    if (!apiKey) { alert('Please enter your Anthropic API key in the top right.'); return; }
    if (!question) return;

    addMessage('user', question);
    messages.push({ role: 'user', content: question });
    document.getElementById('question-input').value = '';
    document.getElementById('send-btn').disabled = true;
    document.getElementById('send-btn').textContent = '...';

    // Typing indicator
    const win = document.getElementById('chat-window');
    const typing = document.createElement('div');
    typing.className = 'message jarvis';
    typing.id = 'typing';
    typing.innerHTML = `
      <div class="message-label">JARVIS</div>
      <div class="message-bubble" style="color:#2a4a6a;font-style:italic">Consulting the documentation...</div>
    `;
    win.appendChild(typing);
    win.scrollTop = win.scrollHeight;

    const config = window.JARVIS_CONFIG;
    const systemPrompt = `You are JARVIS -- Just A Rather Very Intelligent System. You are the intelligent \
documentation assistant for ${config.productName}. You are precise, efficient, and quietly brilliant. \
You answer questions about the documentation with accuracy and concision. You reference specific sections \
when relevant. You never fabricate information that is not in the documentation. If something is not covered, \
say so clearly and suggest where the user might find more help. You may permit yourself the occasional dry \
observation if the situation genuinely warrants it.

Here is the documentation you have been given:

---
${getDocumentContext()}
---`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          system: systemPrompt,
          messages: messages
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || 'API error');

      const answer = data.content[0].text;
      messages.push({ role: 'assistant', content: answer });

      document.getElementById('typing').remove();
      addMessage('jarvis', answer);

    } catch (err) {
      document.getElementById('typing').remove();
      addMessage('jarvis', `I encountered an error: ${err.message}. Please check your API key and try again.`);
    } finally {
      document.getElementById('send-btn').disabled = false;
      document.getElementById('send-btn').textContent = 'Ask';
      win.scrollTop = win.scrollHeight;
    }
  }

  // ---------------------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------------------
  init();
</script>

</body>
</html>
